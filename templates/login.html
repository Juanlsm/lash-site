<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

.box {
    width: 300px;
    margin: 100px auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #c8a27a;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>

</head>
<body>

<div class="box">
    <h2>Área da Lash Designer</h2>

    <form method="post">
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

    {% if erro %}
        <p style="color:red">{{ erro }}</p>
    {% endif %}
</div>

</body>
</html>
