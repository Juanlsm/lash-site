<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luua Lash Designer</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

/* TÍTULO */
h1 {
    margin-top: 30px;
}

/* CONTAINER CENTRAL */
.container {
    width: 800px;
    margin: 40px auto;
    position: relative;
    overflow: hidden;
}

/* CARROSSEL */
.carrossel {
    display: flex;
    gap: 20px;
    transition: transform 0.4s ease;
}

/* CARD */
.card {
    min-width: 250px;
    background: white;
    padding: 15px;
    border-radius: 12px;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

.card h3 {
    font-size: 16px;
}

.card p {
    color: #c8a27a;
    font-weight: bold;
}

.card button {
    background: #c8a27a;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
}

/* SETAS */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: #c8a27a;
    color: white;
    border: none;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
}

.left {
    left: -10px;
}

.right {
    right: -10px;
}
</style>
</head>

<body>

<h1>Luua Lash Designer</h1>

<div class="container">

<button class="arrow left" onclick="voltar()">‹</button>

<div class="carrossel" id="carrossel">

{% for s in servicos %}
<div class="card">
    <img src="{{ s[3] }}">
    <h3>{{ s[1] }}</h3>
    <p>R$ {{ s[2] }}</p>

    <a href="/agendamento?servico={{ s[1] }}">
        <button>Agendar</button>
    </a>
</div>
{% endfor %}

</div>

<button class="arrow right" onclick="avancar()">›</button>

</div>

<script>
let index = 0;

function avancar() {
    const carrossel = document.getElementById("carrossel");
    const total = carrossel.children.length;

    if (index < total - 3) {
        index++;
    }

    atualizar();
}

function voltar() {
    if (index > 0) {
        index--;
    }

    atualizar();
}

function atualizar() {
    const carrossel = document.getElementById("carrossel");
    const cardWidth = carrossel.children[0].offsetWidth + 20;
    carrossel.style.transform = `translateX(-${index * cardWidth}px)`;
}
</script>

</body>
</html>
